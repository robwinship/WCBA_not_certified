name: Daily OBA Coach Scraper

on:
  schedule:
    # Run daily at 8 AM Eastern Time
    # 13:00 UTC = 8:00 AM EST (winter) / 9:00 AM EDT (summer)
    # Using 12:00 UTC for closer alignment to 8am EDT
    - cron: '0 12 * * *'
  
  # Allow manual triggering
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 playwright
      
      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium
      
      - name: Run scraper
        run: python scraper.py
      
      - name: Commit and push changes
        run: |
          git config --local user.email "robwinship@hotmail.com"
          git config --local user.name "robwinship"
          
          if git diff --quiet data.json; then
            echo "No changes to data.json"
          else
            git add data.json
            git commit -m "chore: update coach data - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi
